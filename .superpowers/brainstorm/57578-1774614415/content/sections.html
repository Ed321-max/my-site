<h2>页面区块结构</h2>
<p class="subtitle">Hero + 个人介绍 + 作品集 + 博客 + 联系方式</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>单栏纵向流</h3>
      <p>各区块依次纵向排列，单栏布局。滚动浏览，结构清晰，参考 Vercel 首页。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>非对称网格式</h3>
      <p>作品集区域使用网格式布局（2列错位），博客使用卡片流。视觉更有层次但不混乱。</p>
    </div>
  </div>
</div>
