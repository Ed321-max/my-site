<h2>项目结构方案</h2>
<p class="subtitle">Astro + React Islands 的两种集成深度</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>页面组件化（推荐）</h3>
      <p>每个区块（Hero/About/Portfolio/Blog/Contact）独立为 React 组件，用 Astro 的 client:visible 按需水合。动画集中在 React 侧，SSR 输出静态 HTML。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>全 SPA 化</h3>
      <p>整个页面用一个 React 根组件，Astro 只做入口壳。路由在 React 侧管理，动画连贯但首屏需要加载 JS。</p>
    </div>
  </div>
</div>
