<h2>动画哲学</h2>
<p class="subtitle">极简风格中动画是点睛之笔</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>极克制 · 微交互驱动</h3>
      <p>只在关键节点有轻量动画：hover 浮起、滚动淡入。动画是配角，不抢内容眼球。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>适度 · 叙事感滚动</h3>
      <p>GSAP ScrollTrigger 驱动章节渐入，配合打字机效果和磁性鼠标。动画有叙事节奏感。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>大胆 · 沉浸式体验</h3>
      <p>大量动画：滚动视差、3D tilt、粒子背景、缓动曲线夸张。给访客留下深刻印象。</p>
    </div>
  </div>
</div>
