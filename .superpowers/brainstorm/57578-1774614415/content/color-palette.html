<h2>配色方案选择</h2>
<p class="subtitle">基于极简艺术风 + 克制留白的基调</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>深空灰 + 暖白</h3>
      <p>背景 #0a0a0a / 文字 #fafafa，辅以一处暖色点缀（如琥珀色光晕）。类似 Linear 的克制深色。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>石墨灰 + 鼠尾草绿</h3>
      <p>背景 #121212 / 文字 #e8e8e8，辅以低饱和绿色 #8b9a7d 点缀。更有生命力但依然克制。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>纯白 + 炭灰</h3>
      <p>背景 #ffffff / 文字 #1a1a1a，极致轻盈。适合简历向内容为主的设计。</p>
    </div>
  </div>
</div>
