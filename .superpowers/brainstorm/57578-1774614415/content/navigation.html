<h2>导航交互方式</h2>
<p class="subtitle">NFC 扫码打开，移动端优先</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>极简顶部导航</h3>
      <p>顶部固定小横条 Logo + 锚点链接。滚到区块时对应锚点高亮，点击平滑滚动。干净不占空间。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>侧边悬浮导航</h3>
      <p>右侧固定小圆点导航，点击跳转章节。鼠标悬停显示章节名。更有设计感但对移动端适配要求更高。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>无导航 · 全屏滚动分区</h3>
      <p>无传统导航栏，每个区块占满视口，全屏滚动切换。沉浸感最强，适合少章节场景。</p>
    </div>
  </div>
</div>
