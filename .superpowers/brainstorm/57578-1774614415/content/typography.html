<h2>字体选择</h2>
<p class="subtitle">极简风格中字体是灵魂</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Satoshi + 霞鹜文楷</h3>
      <p>Satoshi（英文无衬线）+ 霞鹜文楷（中文），现代几何感 + 中文衬线体温和感。适合产品/设计向内容。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Geist + 思源黑体</h3>
      <p>Vercel 官网同款，Geist（西文）+ 思源黑体（中文）。极客感强、现代感足、与 Vercel 气质吻合。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Noto Sans + 思源宋体</h3>
      <p>Noto Sans（西文）+ 思源宋体（中文）。用宋体标题增加文化感，适合有深度内容输出的个人品牌。</p>
    </div>
  </div>
</div>
