<h2>个人主页的整体视觉风格，你更倾向哪种？</h2>
<p class="subtitle">这将决定整个网站的气质</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>暗夜极客风</h3>
      <p>深色背景 + 霓虹点缀，代码感与未来感并存。适合强调技术深度和极客气质。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>极简艺术风</h3>
      <p>大量留白 + 精致排版，安静但有力量。适合突出思考深度和产品品味。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>温暖质感风</h3>
      <p>低饱和色调 + 柔和光影，有温度不冷淡。适合强调人文关怀和AI PM的同理心。</p>
    </div>
  </div>
  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>前卫实验风</h3>
      <p>渐变流体 + 动态几何，大胆打破常规。适合突出vibe coding的创新精神。</p>
    </div>
  </div>
</div>
